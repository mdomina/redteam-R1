# Accelerate config — ZeRO-3 su 4 GPU
# Ottimale per: 4× A100 40GB / 4× H100
# Uso: accelerate launch --config_file accelerate_configs/zero3_4gpu.yaml sft.py --config config.yaml

compute_environment: LOCAL_MACHINE
distributed_type: "DEEPSPEED"
num_processes: 4
num_machines: 1
machine_rank: 0
main_process_ip: null
main_process_port: 29500
main_training_function: main
mixed_precision: "bf16"
downcast_bf16: "no"
use_cpu: false

deepspeed_config:
  gradient_accumulation_steps: "auto"
  gradient_clipping: 1.0
  offload_optimizer_device: "none"      # "cpu" se OOM
  offload_param_device: "none"          # "cpu" se OOM
  zero3_init_flag: true
  zero3_save_16bit_model: true
  zero_stage: 3
